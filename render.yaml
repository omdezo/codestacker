databases:
  - name: flowcare-db
    databaseName: flowcare
    plan: standard

services:
  - type: web
    name: flowcare-api
    plan: standard
    runtime: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flowcare-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_FILE_SIZE_MB
        value: 5
      - key: ADMIN_EMAIL
        value: admin@flowcare.com
      - key: ADMIN_PASSWORD
        sync: false
